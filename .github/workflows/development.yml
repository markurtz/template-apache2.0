# =============================================================================
# development.yml — PR CI
#
# Triggers:
#   pull_request → main
#
# Stage 1 — Quality & Security
# Stage 2 — Tests (Unit & Integration)
# Stage 3 — Docs (Conditional on changes)
# Stage 4 — Build Package
# Stage 5 — Comment on PR
# =============================================================================
name: "CI — Development"

on:
  pull_request:
    branches:
      - main

concurrency:
  group: "dev-${{ github.head_ref }}"
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:

  # ── Determine Changes ──────────────────────────────────────────────────────
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for docs changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

  # ── Stage 1: Quality & Security ────────────────────────────────────────────
  quality:
    name: "Quality Gate"
    uses: ./.github/workflows/_quality.yml

  security:
    name: "Security Audit"
    uses: ./.github/workflows/_security.yml

  # ── Stage 2: Tests ─────────────────────────────────────────────────────────
  tests:
    name: "Run Tests"
    uses: ./.github/workflows/_tests.yml
    with:
      test_matrix: >-
        [
          {"level": "unit", "types": "smoke, sanity"},
          {"level": "integration", "types": "smoke"}
        ]
      generate_coverage: true
      publish_results: true
      retention_days: 7

  # ── Stage 3: Docs (Conditional) ────────────────────────────────────────────
  docs:
    name: "Build & Deploy Docs"
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/_docs.yml
    with:
      build_type: "dev-branch"
      alias: "pr-${{ github.event.pull_request.number }}"

  # ── Stage 4: Build ─────────────────────────────────────────────────────────
  build:
    name: "Build Package"
    uses: ./.github/workflows/_build_package.yml
    with:
      build_type: "dev"
  
